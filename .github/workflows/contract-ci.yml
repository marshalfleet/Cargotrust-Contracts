name: CargoTrust Contract CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  contract:
    name: Rust Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: cargo-${{ hashFiles('contracts/**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Run contract tests
        working-directory: contracts
        run: cargo test --features testutils

      - name: Build WASM (release)
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release --quiet

      - name: Clippy
        working-directory: contracts
        run: cargo clippy --all-targets -- -D warnings

  frontend:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Validate env examples
        run: node scripts/validate-env-examples.js

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci
